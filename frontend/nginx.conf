# ============================================================
# Конфигурация nginx для SPA-приложения.
#
# Nginx выполняет три задачи:
# 1. Раздаёт статические файлы Vue (HTML, CSS, JS)
# 2. Проксирует API-запросы к Django-бекенду
# 3. Проксирует WebSocket-соединения к Django Channels
# ============================================================

server {
    # Nginx слушает на порту 80 внутри контейнера.
    # docker-compose пробрасывает этот порт наружу (например 8888:80).
    listen 80;

    # Имя сервера — принимаем запросы от любого хоста.
    server_name localhost;

    # Максимальный размер тела запроса (загружаемых файлов).
    # По умолчанию nginx разрешает только 1MB — этого мало для изображений.
    # Устанавливаем 10MB: достаточно для фото до resize (320×240 после обработки).
    # Django дополнительно проверяет размер через валидатор в serializers.py.
    client_max_body_size 10M;

    # Корневая папка где лежат собранные файлы фронтенда.
    # Dockerfile скопировал туда содержимое папки dist/.
    root /usr/share/nginx/html;

    # Файл по умолчанию — index.html который запускает Vue-приложение.
    index index.html;

    # ===== Маршрут для Django Admin =====
    # ВАЖНО: этот блок должен быть ДО блока location /.
    # Nginx проверяет блоки location сверху вниз и останавливается
    # на первом совпадении. Без этого блока nginx отдавал бы
    # index.html вместо Django-админки.
    location /admin/ {
        # Перенаправляем запросы к Django-бекенду.
        # 'backend' — имя сервиса в docker-compose.yml.
        # Docker автоматически разрешает это имя в IP-адрес контейнера.
        proxy_pass http://backend:8000;

        # $http_host содержит хост И порт (например localhost:8888).
        # Важно для правильных редиректов в Django-админке.
        # Если использовать $host, порт теряется и редирект идёт на порт 80.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== Маршрут для REST API =====
    # Все запросы вида /api/... проксируются к Django.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== Маршрут для медиафайлов =====
    # Загруженные пользователями файлы (изображения, документы).
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== Маршрут для статических файлов Django =====
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== Маршрут для WebSocket =====
    # WebSocket требует специальных заголовков для установки соединения.
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Эти заголовки переключают соединение с HTTP на WebSocket.
        # Upgrade: websocket — говорит серверу что клиент хочет WebSocket.
        # Connection: upgrade — говорит что соединение нужно обновить.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Таймаут для WebSocket — 1 час.
        # Без этого nginx закроет соединение через 60 секунд простоя.
        proxy_read_timeout 3600s;
    }

    # ===== Маршрут для Vue SPA =====
    # Все остальные запросы — отдаём index.html.
    # try_files проверяет файлы в указанном порядке:
    #   $uri        — ищем файл с точным именем (например /logo.png)
    #   $uri/       — ищем директорию
    #   /index.html — если ничего не найдено — отдаём главную страницу Vue.
    # Это нужно для Vue Router: при обновлении страницы /comments/5
    # nginx не найдёт такой файл и отдаст index.html,
    # а Vue Router уже сам обработает этот URL.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
